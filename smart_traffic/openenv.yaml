spec_version: 1
name: smart-traffic-env
version: 0.1.0
description: "9×9 MARL traffic signal control with 81 agents and 14 scenarios"
type: space
runtime: fastapi
app: server.app:app
port: 8000

client:
  class_name: SmartTrafficEnv
  module: smart_traffic.client

action:
  class_name: MultiAgentAction
  module: smart_traffic.models

observation:
  class_name: TrafficObservation
  module: smart_traffic.models

default_image: smart-traffic-env:latest

tags:
  - traffic
  - marl
  - grid-world
  - reinforcement-learning
  - multi-agent

author: Singhtanuj387
